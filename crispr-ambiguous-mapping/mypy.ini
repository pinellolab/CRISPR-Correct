[mypy]
# §5.3: lenient baseline — the package has decades-old heterogeneous
# annotations; aim to tighten per-module over time rather than flipping
# everything to strict at once. Users can run `mypy crispr_ambiguous_mapping/`
# from the package root.
python_version = 3.10
ignore_missing_imports = True
follow_imports = skip
check_untyped_defs = False
warn_unused_ignores = True
warn_return_any = False

# Models are small, well-typed, and the most likely to be consumed by external
# code — check them strictly.
[mypy-crispr_ambiguous_mapping.models.*]
check_untyped_defs = True
disallow_untyped_defs = False
warn_return_any = True
